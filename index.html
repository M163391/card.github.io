<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Birthday Card</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Audio (hidden, plays via button) -->
  <audio id="bdaySong" src="Music/BD.mp3"></audio>
  <audio id="vSound" src="Music/MV.mp3"></audio>
<audio id="cSound" src="Music/C.mp3"></audio>

  <div class="card">
    <h1>Happy Birthday!</h1>
    <p>Click below for your surprise 🎉</p>
    <button onclick="playMusic()">Play Music</button>
    <button onclick="showSurprise()">Reveal Surprise</button>
    <button id="warnBtn">Don't click</button>

    <div id="surprise" style="display:none;">
      <h2>🎂 Happy birthday Korou!! ❤️</h2>
      <p id="message"></p>
    </div>
  <!-- Stickers -->
<div class="sticker-container">
  <img src="Images/M.png" alt="Messi" class="sticker" id="mSticker">
</div>

<div class="sticker-container">
  <img src="Images/B.png" alt="Barcelona Logo" class="sticker" id="bSticker">
</div>
<div class="sticker-container">
  <img src="Images/V.png" alt="Max Verstappen" class="sticker" id="vSticker">
  <span class="vStickerHint">Click Me! 🎵</span>
</div>
  </div>


  <script src="script.js"></script>
  
</div>

</body>
</html>
